[build]
  command = "npm run build"
  publish = "dist"

# Don't redirect static assets - serve them as-is
[[redirects]]
  from = "/test-certs/*"
  to = "/test-certs/:splat"
  status = 200

# Catch-all redirect for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
