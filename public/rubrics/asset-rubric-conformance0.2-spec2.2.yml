rubric_metadata:
  name: C2PA Asset Conformance 0.2 Spec 2.2 Rubric
  issuer: C2PA Conformance Task Force
  date: '2026-03-31T05:00:00Z'
  version: 0.2.0
  language: en

---

- id: validation:inception_action_position
  description: Check if an inception action is the first action in the first actions assertion in created_assertions
  expression: |-
    ends_with(not_null(manifests[0]."claim.v2".created_assertions[?contains(url, 'c2pa.actions')] | [0].url, ''), 'c2pa.actions.v2') && (length(manifests[0].assertions."c2pa.actions.v2".actions[?action == 'c2pa.created']) == `0` || contains(['c2pa.created', 'c2pa.opened'], manifests[0].assertions."c2pa.actions.v2".actions[0].action))
  reportText:
    'true':
      en: Inception action is correctly positioned as the first item in the first created actions assertion
    'false':
      en: Inception action is not in the first actions assertion of created_assertions (or first item is not an actions assertion)
- id: validation:thumbnail_location
  description: Ensure thumbnail assertions are in created_assertions, not gathered_assertions
  expression: |
    length((manifests[0]."claim.v2".gathered_assertions || `[]`)[?contains(url, 'c2pa.thumbnail.claim') || contains(url, 'c2pa.thumbnail.ingredient')]) == `0` &&
    (length(keys(manifests[0].assertions || `{}`)[?starts_with(@, 'c2pa.thumbnail.claim')]) == `0` || length((manifests[0]."claim.v2".created_assertions || `[]`)[?contains(url, 'c2pa.thumbnail.claim')]) > `0`) &&
    (length(keys(manifests[0].assertions || `{}`)[?starts_with(@, 'c2pa.thumbnail.ingredient')]) == `0` || length((manifests[0]."claim.v2".created_assertions || `[]`)[?contains(url, 'c2pa.thumbnail.ingredient')]) > `0`)
  reportText:
    'true':
      en: Thumbnail assertions are correctly located in created_assertions
    'false':
      en: Thumbnail assertions found in gathered_assertions or missing from created_assertions
- id: validation:mandatory_spec_version
  description: Check if specVersion is present in claim_generator_info (mandatory since v0.2)
  expression: |-
    manifests[0]."claim.v2".claim_generator_info.specVersion != null
  reportText:
    'true':
      en: Found 'specVersion' in claim_generator_info
    'false':
      en: Missing mandatory 'specVersion' in claim_generator_info
- id: validation:well_formed_data_present
  description: Check if validation results are present for structural analysis
  expression: |-
    manifests[0].validationResults != null
  reportText:
    'true':
      en: Validation results are present for structural analysis
    'false':
      en: Missing validation results in the manifest
- id: validation:well_formed_success
  description: Check if the asset has any structural or malformation failures (from the well-formed list)
  failIfMatched: true
  expression: |-
    (manifests[0].validationResults || { failure: [{code: 'MISSING_VALIDATION_RESULTS'}] }).failure[?contains(['assertion.action.malformed', 'assertion.bmffHash.malformed', 'assertion.boxesHash.malformed', 'assertion.collectionHash.malformed', 'assertion.dataHash.malformed', 'assertion.external-reference.malformed', 'assertion.ingredient.malformed', 'assertion.alternativeContentRepresentation.malformed', 'assertion.multiAssetHash.malformed', 'assertion.cbor.invalid', 'assertion.json.invalid', 'claim.cbor.invalid', 'claim.hardBindings.missing', 'claim.malformed', 'claim.missing', 'claim.multiple', 'hashedURI.missing', 'ingredient.manifest.missing', 'assertion.boxesHash.unknownBox', 'assertion.multipleHardBindings', 'manifest.compressed.invalid', 'manifest.html.multipleManifests', 'manifest.inaccessible', 'manifest.multipleParents', 'manifest.structuredText.emptyReference', 'manifest.structuredText.malformedReference', 'manifest.structuredText.multipleReferences', 'manifest.structuredText.noManifest', 'manifest.structuredText.noResolutionPath', 'manifest.timestamp.invalid', 'manifest.timestamp.wrongParents', 'manifest.update.invalid', 'manifest.update.wrongParents', 'MISSING_VALIDATION_RESULTS'], code)].code
  reportText:
    'true':
      en: No structural failures found
    'false':
      en: 'Found structural failures: {{matches}}'
- id: validation:valid_data_present
  description: Check if validation results are present for integrity analysis
  expression: |-
    manifests[0].validationResults != null
  reportText:
    'true':
      en: Validation results are present for integrity analysis
    'false':
      en: Missing validation results in the manifest
- id: validation:valid_success
  description: Check if the asset has any validation mismatches (from the valid list)
  failIfMatched: true
  expression: |-
    (manifests[0].validationResults || { failure: [{code: 'MISSING_VALIDATION_RESULTS'}] }).failure[?contains(['assertion.action.ingredientMismatch', 'assertion.action.redactionMismatch', 'assertion.bmffHash.mismatch', 'assertion.boxesHash.mismatch', 'assertion.collectionHash.mismatch', 'assertion.dataHash.mismatch', 'assertion.external-reference.hashMismatch', 'assertion.alternativeContentRepresentation.hashMismatch', 'assertion.multiAssetHash.mismatch', 'assertion.hashedURI.mismatch', 'hashedURI.mismatch', 'ingredient.manifest.mismatch', 'ingredient.claimSignature.missing', 'ingredient.claimSignature.mismatch', 'claimSignature.missing', 'MISSING_VALIDATION_RESULTS'], code)].code
  reportText:
    'true':
      en: No validation mismatches found
    'false':
      en: 'Found validation mismatches: {{matches}}'
- id: validation:trusted_data_present
  description: Check if validation results are present for trust analysis
  expression: |-
    manifests[0].validationResults != null
  reportText:
    'true':
      en: Validation results are present for trust analysis
    'false':
      en: Missing validation results in the manifest
- id: validation:trusted_success
  description: Check if the asset has any trust failures (from the trusted list)
  failIfMatched: true
  expression: |-
    (manifests[0].validationResults || { failure: [{code: 'MISSING_VALIDATION_RESULTS'}] }).failure[?contains(['claimSignature.mismatch', 'claimSignature.outsideValidity', 'signingCredential.invalid', 'signingCredential.ocsp.revoked', 'signingCredential.untrusted', 'MISSING_VALIDATION_RESULTS'], code)].code
  reportText:
    'true':
      en: Asset is trusted
    'false':
      en: 'Found trust failures: {{matches}}'
- id: validation:active_manifest_urn
  description: Check if the active manifest URN uses 'urn:c2pa:' prefix (v2.2+ requirement)
  expression: |-
    starts_with(not_null(manifests[0].label, ''), 'urn:c2pa:')
  reportText:
    'true':
      en: Active manifest URN uses standard 'urn:c2pa:' prefix
    'false':
      en: Active manifest URN uses old 'urn:uuid' prefix (pre-v2.2)
- id: validation:no_deprecated_assertions
  description: Check for known deprecated assertion labels (e.g. from v2.0 or earlier specs)
  failIfMatched: true
  expression: |-
    keys(manifests[0].assertions || `{}`)[?starts_with(@, 'stds.') || contains(['c2pa.claim', 'c2pa.hash.bmff.v2', 'c2pa.asset-type', 'c2pa.ingredient', 'c2pa.ingredient.v2', 'c2pa.actions'], @)]
  reportText:
    'true':
      en: No deprecated standard assertions found
    'false':
      en: 'Found deprecated standard assertions: {{matches}}'
- id: validation:no_unsupported_assertions
  description: Check if all C2PA standard assertions are in the allow-list for Spec 2.2
  failIfMatched: true
  expression: |-
    keys(manifests[0].assertions || `{}`)[?starts_with(@, 'c2pa.') && !starts_with(@, 'c2pa.hash.data') && !contains(['c2pa.actions.v2', 'c2pa.ingredient.v3', 'c2pa.hash.boxes', 'c2pa.hash.bmff.v3', 'c2pa.collection-data', 'c2pa.soft-binding', 'c2pa.cloud-data', 'c2pa.embedded-data', 'c2pa.metadata', 'c2pa.cert-status', 'c2pa.asset-ref', 'c2pa.asset-type.v2', 'c2pa.hash.multi-asset', 'c2pa.thumbnail.claim', 'c2pa.thumbnail.ingredient', 'c2pa.depthmap.GDepth', 'c2pa.icon'], @) && !(contains(@, '__') && (starts_with(@, 'c2pa.actions.v2') || starts_with(@, 'c2pa.ingredient.v3') || starts_with(@, 'c2pa.hash.boxes') || starts_with(@, 'c2pa.hash.bmff.v3') || starts_with(@, 'c2pa.collection-data') || starts_with(@, 'c2pa.soft-binding') || starts_with(@, 'c2pa.cloud-data') || starts_with(@, 'c2pa.embedded-data') || starts_with(@, 'c2pa.metadata') || starts_with(@, 'c2pa.cert-status') || starts_with(@, 'c2pa.asset-ref') || starts_with(@, 'c2pa.asset-type.v2') || starts_with(@, 'c2pa.hash.multi-asset') || starts_with(@, 'c2pa.thumbnail.claim') || starts_with(@, 'c2pa.thumbnail.ingredient') || starts_with(@, 'c2pa.depthmap.GDepth') || starts_with(@, 'c2pa.icon'))) && !contains(['c2pa.claim', 'c2pa.hash.bmff.v2', 'c2pa.asset-type', 'c2pa.ingredient', 'c2pa.ingredient.v2', 'c2pa.actions'], @)]
  reportText:
    'true':
      en: All standard assertions are supported for Spec 2.2
    'false':
      en: 'Found unsupported or unknown standard C2PA assertions: {{matches}}'
- id: validation:no_deprecated_actions
  description: Check for deprecated action types in c2pa.actions.v2
  expression: |-
    length((manifests[0].assertions."c2pa.actions.v2".actions || `[]`)[?contains(['c2pa.copied', 'c2pa.formatted', 'c2pa.version_updated', 'c2pa.printed', 'c2pa.managed', 'c2pa.produced', 'c2pa.saved', 'c2pa.color_adjustments', 'c2pa.watermarked'], action)]) == `0`
  reportText:
    'true':
      en: No deprecated actions used
    'false':
      en: Found deprecated actions (e.g. c2pa.copied, c2pa.printed, etc.)
- id: validation:review_ratings_datasource
  description: Check that reviewRatings is absent when dataSource type is human entry
  expression: |-
    length(values(manifests[0].assertions || `{}`)[? reviewRatings != null && contains(['humanEntry.anonymous', 'humanEntry.credentialed'], dataSource.type)]) == `0`
  reportText:
    'true':
      en: No invalid co-occurrence of reviewRatings and human entry dataSource
    'false':
      en: Found reviewRatings in an assertion with human entry dataSource
- id: validation:ingredient_v3_no_active_manifest
  description: Check that ingredient v3 has no validationResults if no activeManifest
  expression: |-
    length(values(manifests[0].assertions || `{}`)[? relationship != null && activeManifest == null && validationResults != null]) == `0`
  reportText:
    'true':
      en: Ingredient v3 assertions without activeManifest correctly omit validationResults
    'false':
      en: Found ingredient v3 assertion without activeManifest but containing validationResults
- id: validation:ingredient_relationship_values
  description: Check that the relationship field in all ingredient assertions is valid
  expression: |-
    length(values(manifests[0].assertions || `{}`)[? relationship != null && !contains(['parentOf', 'inputTo', 'componentOf'], relationship)]) == `0`
  reportText:
    'true':
      en: All ingredient assertions have valid relationship values
    'false':
      en: Found ingredient assertion with invalid relationship value
- id: validation:update_manifest_constraints
  description: Check constraints for Update Manifests (no thumbnail, exactly one parentOf ingredient)
  expression: |-
    manifests[0].assertions."c2pa.hash.data" != null || length(values(manifests[0].assertions || `{}`)[? relationship != null]) == `0` || (manifests[0].assertions."c2pa.thumbnail.claim" == null && length(values(manifests[0].assertions || `{}`)[? relationship == 'parentOf']) == `1`)
  reportText:
    'true':
      en: Update manifest constraints are satisfied (or manifest is not an update manifest)
    'false':
      en: Update manifest violates constraints (has thumbnail or does not have exactly one parentOf ingredient)
