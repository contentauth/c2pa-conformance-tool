    'false':
      en: Does not contain Editorial Transformations Possibly Using GenAI
- id: transformation:signal_nonEditorial
  description: Check if the manifest contains a Non-Editorial Transformations signal
  expression: |
    assertions."c2pa.actions.v2" != null && length("claim.v2".created_assertions[?contains(url, 'c2pa.actions.v2')]) > `0` && length(assertions."c2pa.actions.v2".actions[? action != null && action != 'c2pa.created' && action != 'c2pa.opened' && (action == 'c2pa.converted' || action == 'c2pa.published' || action == 'c2pa.repackaged' || action == 'c2pa.transcoded' || action == 'c2pa.resized.proportional' || action == 'c2pa.enhanced' || action == 'c2pa.edited.metadata' || action == 'c2pa.watermarked' || action == 'c2pa.watermarked.bound' || action == 'c2pa.watermarked.unbound' || action == 'c2pa.redacted')]) > `0`
  reportText:
    'true':
      en: Contains Non-editorial Transformations
    'false':
      en: Does not contain Non-editorial Transformations
