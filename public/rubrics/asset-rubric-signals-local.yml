- id: inception:signal_fullyGenAIMedia
  description: Check if the manifest contains a Fully GenAI Media inception signal
  expression: |
    assertions."c2pa.actions.v2" != null && length("claim.v2".created_assertions[?contains(url, 'c2pa.actions.v2')]) > `0` && length(assertions."c2pa.actions.v2".actions[? action == 'c2pa.created' && digitalSourceType == 'http://cv.iptc.org/newscodes/digitalsourcetype/trainedAlgorithmicMedia']) > `0`
