rubric_metadata:
  name: C2PA Asset Signals Rubric (Local)
  issuer: C2PA Conformance Task Force
  date: '2026-03-31T05:00:00Z'
  version: 1.0.0
  language: en

---

- id: inception:signal_blankCanvas
  description: Check if the manifest contains a Blank Canvas inception signal
  expression: |
    assertions."c2pa.actions.v2" != null && length("claim.v2".created_assertions[?contains(url, 'c2pa.actions.v2')]) > `0` && length(assertions."c2pa.actions.v2".actions[? action == 'c2pa.created' && digitalSourceType == 'http://c2pa.org/digitalsourcetype/empty']) > `0`
  reportText:
    'true':
      en: Contains Blank Canvas
    'false':
      en: Does not contain Blank Canvas
- id: inception:signal_capturedMedia
  description: Check if the manifest contains a Captured media inception signal
  expression: |
    assertions."c2pa.actions.v2" != null && length("claim.v2".created_assertions[?contains(url, 'c2pa.actions.v2')]) > `0` && length(assertions."c2pa.actions.v2".actions[? action == 'c2pa.created' && (digitalSourceType == 'http://cv.iptc.org/newscodes/digitalsourcetype/digitalCapture' || digitalSourceType == 'http://cv.iptc.org/newscodes/digitalsourcetype/computationalCapture')]) > `0`
  reportText:
    'true':
      en: Contains Captured Media
    'false':
      en: Does not contain Captured Media
- id: inception:signal_capturedMediaStitched
  description: Check if the manifest contains a Stitched Captured Media inception signal
  expression: |
    assertions."c2pa.actions.v2" != null && length("claim.v2".created_assertions[?contains(url, 'c2pa.actions.v2')]) > `0` && length(assertions."c2pa.actions.v2".actions[? action == 'c2pa.created' && digitalSourceType == 'http://cv.iptc.org/newscodes/digitalsourcetype/compositeCapture']) > `0`
  reportText:
    'true':
      en: Contains Stitched Captured Media
    'false':
      en: Does not contain Stitched Captured Media
- id: inception:signal_compositionMayContainGenAI
  description: |-
    Check if the manifest contains a Composition which may contain GenAI content inception signal
  expression: |
    assertions."c2pa.actions.v2" != null && length("claim.v2".created_assertions[?contains(url, 'c2pa.actions.v2')]) > `0` && length(assertions."c2pa.actions.v2".actions[? action == 'c2pa.created' && digitalSourceType == 'http://cv.iptc.org/newscodes/digitalsourcetype/composite']) > `0`
