- id: transformation:signal_editorialAI
  description: Check if the manifest contains an Editorial GenAI Transformations signal
  expression: |
    assertions."c2pa.actions.v2" != null && length("claim.v2".created_assertions[?contains(url, 'c2pa.actions.v2')]) > `0` && length(assertions."c2pa.actions.v2".actions[? action != null && action != 'c2pa.created' && action != 'c2pa.opened' && action != 'c2pa.converted' && action != 'c2pa.published' && action != 'c2pa.repackaged' && action != 'c2pa.transcoded' && action != 'c2pa.resized.proportional' && action != 'c2pa.enhanced' && action != 'c2pa.edited.metadata' && action != 'c2pa.watermarked' && action != 'c2pa.watermarked.bound' && action != 'c2pa.watermarked.unbound' && action != 'c2pa.redacted' && (digitalSourceType == 'http://cv.iptc.org/newscodes/digitalsourcetype/trainedAlgorithmicMedia' || digitalSourceType == 'http://cv.iptc.org/newscodes/digitalsourcetype/compositeWithTrainedAlgorithmicMedia' || digitalSourceType == 'http://cv.iptc.org/newscodes/digitalsourcetype/compositeSynthetic')]) > `0`
  reportText:
    'true':
      en: Contains Editorial GenAI Transformations
    'false':
      en: Does not contain Editorial GenAI Transformations
- id: transformation:signal_editorialNonAI
  description: Check if the manifest contains an Editorial Non-GenAI Transformations signal
  expression: |
    assertions."c2pa.actions.v2" != null && length("claim.v2".created_assertions[?contains(url, 'c2pa.actions.v2')]) > `0` && length(assertions."c2pa.actions.v2".actions[? action != null && action != 'c2pa.created' && action != 'c2pa.opened' && action != 'c2pa.converted' && action != 'c2pa.published' && action != 'c2pa.repackaged' && action != 'c2pa.transcoded' && action != 'c2pa.resized.proportional' && action != 'c2pa.enhanced' && action != 'c2pa.edited.metadata' && action != 'c2pa.watermarked' && action != 'c2pa.watermarked.bound' && action != 'c2pa.watermarked.unbound' && action != 'c2pa.redacted' && digitalSourceType != null && (digitalSourceType != 'http://cv.iptc.org/newscodes/digitalsourcetype/trainedAlgorithmicMedia' && digitalSourceType != 'http://cv.iptc.org/newscodes/digitalsourcetype/compositeWithTrainedAlgorithmicMedia' && digitalSourceType != 'http://cv.iptc.org/newscodes/digitalsourcetype/compositeSynthetic')]) > `0`
  reportText:
    'true':
      en: Contains Editorial Non-GenAI Transformations
    'false':
      en: Does not contain Editorial Non-GenAI Transformations
- id: transformation:signal_editorialPossiblyGenAI
