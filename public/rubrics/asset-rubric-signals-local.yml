- id: inception:signal_mediaUnknownProvenance
  description: Check if the manifest contains a Media of Unknown Provenance inception signal
  expression: |
    assertions."c2pa.ingredient.v3" != null && assertions."c2pa.ingredient.v3".activeManifest == null
  reportText:
    'true':
      en: Contains Media of Unknown Provenance
    'false':
      en: Does not contain Media of Unknown Provenance
